name: Deploy Unitask

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: mbstring, pdo, pdo_mysql, bcmath, intl

      - name: Install PHP dependencies
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare build folder
        run: |
          rm -rf build
          mkdir build

          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude "tests" \
            --exclude "/build/" \
            ./ build/

      - name: Copy vendor into build
        run: |
          cp -R vendor build/vendor

      - name: Validate build
        run: |
          test -f build/vendor/autoload.php
          test -f build/public/build/manifest.json

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Validate SSH key
        run: |
          ssh-keygen -l -f ~/.ssh/id_ed25519

      - name: Test SSH connection
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_SSH_PORT }} \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo SSH OK"

      - name: Rsync to VPS
        run: |
          cp docker-compose.yml.prod.example build/docker-compose.yml

          rsync -rlz --delete \
            --no-times \
            --filter='merge .rsyncfilter' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_SSH_PORT }} -o StrictHostKeyChecking=yes" \
            build/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/srv/apps/unitask

      - name: Remote deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'

          set -euo pipefail
          cd /srv/apps/unitask

          echo "🚀 DEPLOY START"

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          echo "📦 START CONTAINERS"
          docker compose down --remove-orphans
          docker compose up -d --build

          echo "✅ DONE"

          EOF

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/id_ed25519