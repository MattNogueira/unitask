name: Deploy Unitask

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan \
            -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'

          set -e

          cd /srv/apps/unitask

          git fetch origin
          git reset --hard origin/main

          docker compose up -d --build

          docker compose exec -T app php artisan migrate --force

          EOF