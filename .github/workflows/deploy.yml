name: Deploy Unitask

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: mbstring, pdo, pdo_mysql, bcmath, intl

      - name: Install PHP dependencies
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --no-interaction

      - name: Prepare build folder
        run: |
          rm -rf build
          mkdir build

          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude "tests" \
            --exclude "build" \
            ./ build/

      - name: Copy vendor into build
        run: |
          cp -R vendor build/vendor

      - name: Validate build
        run: |
          test -f build/vendor/autoload.php

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Validate SSH key
        run: |
          ssh-keygen -l -f ~/.ssh/id_ed25519

      - name: Test SSH connection
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_SSH_PORT }} \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo SSH OK"

      - name: Rsync to VPS
        run: |
          cp docker-compose.yml.prod.example build/docker-compose.yml

          rsync -rlvz --delete \
            --no-times \
            --exclude-from='.rsyncignore' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_SSH_PORT }} -o StrictHostKeyChecking=yes" \
            build/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/srv/apps/unitask

      - name: Remote deploy
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'

          set -euxo pipefail

          cd /srv/apps/unitask

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          docker compose down --remove-orphans

          docker compose up -d --build

          docker compose exec -T unitask mkdir -p \
            storage/framework/cache \
            storage/framework/views \
            storage/framework/sessions

          docker compose exec -T unitask chown -R www-data:www-data \
            storage bootstrap/cache

          docker compose exec -T unitask chmod -R 775 \
            storage bootstrap/cache

          docker compose exec -T unitask php artisan optimize:clear

          docker compose exec -T unitask php artisan migrate --force

          EOF

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/id_ed25519