name: Deploy Unitask

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files with rsync
        run: |
          rsync -rlvz --delete \
            --no-times \
            --no-perms \
            --no-owner \
            --no-group \
            --exclude ".env" \
            --exclude "storage" \
            --exclude "vendor" \
            --exclude "node_modules" \
            --exclude ".git" \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_SSH_PORT }}" \
            ./ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/srv/apps/unitask

      - name: Remote deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'

          set -e

          cd /srv/apps/unitask

          docker compose up -d --build

          docker compose exec -T app php artisan migrate --force

          EOF

      - name: Cleanup SSH key
        run: |
          rm -f ~/.ssh/id_ed25519