name: Deploy Unitask

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: mbstring, pdo, pdo_mysql, bcmath, intl

      - name: Install PHP dependencies
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --no-interaction

      - name: Prepare build folder
        run: |
          rm -rf build
          mkdir build

          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude "tests" \
            --exclude "build" \
            ./ build/

      - name: Copy vendor into build
        run: |
          cp -R vendor build/vendor

      - name: Validate build
        run: |
          test -f build/vendor/autoload.php

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Validate SSH key
        run: |
          ssh-keygen -l -f ~/.ssh/id_ed25519

      - name: Test SSH connection
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_SSH_PORT }} \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo SSH OK"

      - name: Rsync to VPS
        run: |
          cp docker-compose.yml.prod.example build/docker-compose.yml

          rsync -rlz --delete \
            --no-times \
            --filter='merge .rsyncfilter' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_SSH_PORT }} -o StrictHostKeyChecking=yes" \
            build/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/srv/apps/unitask

      - name: Remote deploy
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'

          set -euxo pipefail

          cd /srv/apps/unitask

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          docker compose down --remove-orphans

          docker compose up -d --build

      - name: Check result
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'

          set -euxo pipefail

          cd /srv/apps/unitask

          echo "===== CONTAINER USER INFO ====="

          docker compose exec -T unitask whoami || true
          docker compose exec -T unitask id || true

          echo "===== STORAGE (HOST VIEW INSIDE CONTAINER) ====="

          docker compose exec -T unitask sh -c "
            ls -ldn storage storage/framework storage/logs storage/bootstrap/cache || true
          "

          echo "===== STORAGE TREE SNAPSHOT ====="

          docker compose exec -T unitask sh -c "
            find storage -maxdepth 3 -type d -exec ls -ldn {} \; || true
          "

          echo "===== TEST WRITE PERMISSION ====="

          docker compose exec -T unitask sh -c "
            touch storage/framework/_write_test 2>&1 || true
            ls -ln storage/framework/_write_test 2>&1 || true
          "

          EOF
      
      - name: Optimize
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'

          set -euxo pipefail

          cd /srv/apps/unitask

          docker compose exec -T unitask php artisan config:cache
          docker compose exec -T unitask php artisan route:cache
          docker compose exec -T unitask php artisan view:cache

          EOF

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/id_ed25519